<title>fitshop.de Monitoring Dashboard - Login</title>
<style>
  body {

    background: #0d1117; color: #e6edf3; display: flex; align-items: center;
    justify-content: center; height: 100vh; margin: 0;
  }
  .box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 32px; width: 320px; text-align: center; }
  h1 { font-size: 18px; margin-bottom: 16px; }
  input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; margin-bottom: 12px; box-sizing: border-box; }
  button { width: 100%; padding: 10px; border-radius: 6px; border: none; background: #ff642d; color: #fff; font-weight: 700; cursor: pointer; }
  button:hover { background: #ff8354; }
  .err { color: #f85149; font-size: 12px; margin-top: 8px; min-height: 16px; }
</style>
</head>
<body>
  <div class="box">
    <h1>🏋️ fitshop.de Dashboard</h1>
    <input type="password" id="pw" placeholder="Passwort" autofocus>
    <button onclick="checkPw()">Öffnen</button>
    <div class="err" id="err"></div>
  </div>
<script>
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}
async function checkPw() {
  const pw = document.getElementById('pw').value;
  const hash = await sha256(pw);
  if (hash === "576e7bbe08595735c33f4026c6f24ef0d78f11941729a063b10af5d6502fd157") {
    sessionStorage.setItem('fitshop_dashboard_auth', hash);
    renderDashboard();
  } else {
    document.getElementById('err').textContent = 'Falsches Passwort.';
  }
}
function renderDashboard() {
  // atob() gives a byte string (Latin-1); decode it as UTF-8 properly so
  // umlauts/emoji in the dashboard don't get mangled.
  const bytes = Uint8Array.from(atob(DASHBOARD_B64), c => c.charCodeAt(0));
  const html = new TextDecoder('utf-8').decode(bytes);
  document.open();
  document.write(html);
  document.close();
}
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });
// Skip prompt if already authed this browser session
(function() {
  const stored = sessionStorage.getItem('fitshop_dashboard_auth');
  if (stored === "576e7bbe08595735c33f4026c6f24ef0d78f11941729a063b10af5d6502fd157") {
    renderDashboard();
  }
