async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}
async function checkPw() {
  const pw = document.getElementById('pw').value;
  const hash = await sha256(pw);
  if (hash === "576e7bbe08595735c33f4026c6f24ef0d78f11941729a063b10af5d6502fd157") {
    sessionStorage.setItem('fitshop_dashboard_auth', hash);
    renderDashboard();
  } else {
    document.getElementById('err').textContent = 'Falsches Passwort.';
  }
}
function renderDashboard() {
  // atob() gives a byte string (Latin-1); decode it as UTF-8 properly so
  // umlauts/emoji in the dashboard don't get mangled. document.write() after
  // the page already loaded is unreliable (mixes with existing DOM) - build
  // a blob: URL and navigate to it instead, which gives a clean fresh document.
  const bytes = Uint8Array.from(atob(DASHBOARD_B64), c => c.charCodeAt(0));
  const blob = new Blob([bytes], {type: 'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  window.location.replace(url);
}
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });
// Skip prompt if already authed this browser session
(function() {
  const stored = sessionStorage.getItem('fitshop_dashboard_auth');
  if (stored === "576e7bbe08595735c33f4026c6f24ef0d78f11941729a063b10af5d6502fd157") {
    renderDashboard();
  }
})();
